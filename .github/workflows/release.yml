name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # Opt into Node.js 24 for GitHub Actions (default starting June 2nd, 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install -y cmake

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake --build build --config Release -- -j$(nproc)

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: cmake --build build --config Release -- /m

      - name: Install
        # Install to the release.* directory as configured in CMakeLists.txt
        run: cmake --install build

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist
          tar -czf dist/Ingress-Field-Design.${{ github.ref_name }}.Linux.x86_64.tar.gz release.Linux.x86_64

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path release.Windows.AMD64 -DestinationPath dist\Ingress-Field-Design.${{ github.ref_name }}.Windows.AMD64.zip

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    name: Create release and upload assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-ubuntu-latest
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-windows-latest
          path: dist

      - name: Extract version number
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Version ${{ steps.get_version.outputs.VERSION }}
          body: Release ${{ github.ref_name }} (automated)
          files: |
            dist/Ingress-Field-Design.${{ github.ref_name }}.Linux.x86_64.tar.gz
            dist/Ingress-Field-Design.${{ github.ref_name }}.Windows.AMD64.zip
